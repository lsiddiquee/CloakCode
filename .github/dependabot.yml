version: 2

# Version-update PRs. Dependabot security updates are a separate repository
# setting and must also be enabled in GitHub (Settings -> Code security).
updates:
  # The root manifest + pnpm workspace lock cover every packages/* manifest.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # Poetry-managed research/dev tooling (pyproject.toml + poetry.lock).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: /packages/gateway
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
