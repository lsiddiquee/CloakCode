version: 2

# Version-update PRs. Dependabot security updates are a separate repository
# setting and must also be enabled in GitHub (Settings -> Code security).
updates:
  # The root manifest + pnpm workspace lock cover every packages/* manifest.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    # Delay version-update PRs by 1 week so a compromised release is likely
    # caught + yanked first (mirrors pnpm-workspace.yaml minimumReleaseAge).
    # Security updates bypass cooldown; GitHub's own default is only 3 days.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    # Group minor/patch bumps into ONE PR per type so weekly updates don't each
    # rewrite pnpm-lock.yaml and pile up mutual merge conflicts (a shared-lockfile
    # PR pileup has to be merged sequentially with a rebase between each). Majors
    # are deliberately left ungrouped so each gets individual review, EXCEPT for
    # tightly-coupled families that MUST version in lockstep (e.g. react +
    # react-dom + their @types): those get a dedicated pattern group covering
    # ALL update-types, so a React major arrives as one reviewable PR instead of
    # separate PRs that each fail CI alone. A rare clash between unrelated majors
    # is still cleared with a one-off combined-update PR.
    #
    # Precedence: Dependabot puts a dependency in the FIRST matching group, so the
    # coupled pattern groups are listed before the broad type groups.
    groups:
      react:
        # Runtime + its types must move together, including on majors (18 -> 19).
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Poetry-managed research/dev tooling (pyproject.toml + poetry.lock).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: /packages/gateway
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    # Keep the gateway image on a Node LTS line. Dependabot has no notion of
    # "LTS" (dependabot/dependabot-core#2247, open since 2018), so we block the
    # non-LTS majors explicitly. 25 is the LAST non-LTS release: under the new
    # schedule (nodejs.org "Evolving the Node.js release schedule") EVERY major
    # from 26 onward becomes LTS after its Current phase. So we ignore only 25 —
    # 24.x minor/patch and the next LTS majors (26, 27, …) still auto-update.
    # (Older odd 21/23 are already EOL; no need to list them.)
    ignore:
      - dependency-name: node
        versions:
          - "25"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
