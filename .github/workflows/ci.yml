name: CI

# Build · typecheck · lint · test the TypeScript monorepo (the shipped product)
# on every push to main and every PR. The research/ Python is stdlib-only spikes,
# not product — no Poetry/mypy/pytest gate; ruff still lints it via the `hooks`
# (pre-commit) job. No publishing here — that lives in release.yml (tags).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — build · typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm BEFORE setup-node so the pnpm cache can be wired. Version comes from
      # the `packageManager` pin in package.json (pnpm@11.9.0).
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # NOTE: the committed .npmrc targets an internal Microsoft package feed
      # (supply-chain screened) for the dev container; public GitHub runners can't
      # reach it, so we swap in the public registry. The committed pnpm-lock.yaml is
      # registry-portable (integrity-only, no absolute tarball URLs), so
      # --frozen-lockfile resolves it from public npm while keeping every version pin.
      - name: Install deps (public npm)
        run: |
          printf 'registry=https://registry.npmjs.org/\n' > .npmrc
          pnpm install --frozen-lockfile

      # Topological order builds @cloakcode/protocol first, so the downstream
      # typechecks (which resolve its dist) pass.
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test

  hooks:
    name: pre-commit (gitleaks · markdownlint · prettier · ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      # The local eslint/prettier hooks need node_modules present. Swap the
      # internal feed for public npm (see the node job); the portable lockfile
      # installs with --frozen-lockfile.
      - name: Install deps (public npm)
        run: |
          printf 'registry=https://registry.npmjs.org/\n' > .npmrc
          pnpm install --frozen-lockfile
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
