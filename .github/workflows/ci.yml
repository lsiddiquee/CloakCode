name: CI

# Build · typecheck · lint · test the TypeScript monorepo (the shipped product)
# on every push to main and every PR. The research/ Python is stdlib-only spikes,
# not product — no Poetry/mypy/pytest gate; ruff still lints it via the `hooks`
# (pre-commit) job. No publishing here — that lives in release.yml (tags).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — build · typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # pnpm BEFORE setup-node so the pnpm cache can be wired. Version comes from
      # the `packageManager` pin in package.json (pnpm@11.9.0).
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      # No committed .npmrc, so the default public npm registry applies; the
      # committed pnpm-lock.yaml is registry-portable (integrity-only, no absolute
      # tarball URLs — kept so by the `pnpm-lock-portable` pre-commit hook), so
      # --frozen-lockfile resolves it from public npm keeping every pin.
      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Topological order builds @cloakcode/protocol first, so the downstream
      # typechecks (which resolve its dist) pass.
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test

  hooks:
    name: pre-commit (gitleaks · markdownlint · prettier · ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      # The local eslint/prettier hooks need node_modules present. Default public
      # npm registry (no committed .npmrc); the portable lockfile installs with
      # --frozen-lockfile.
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # pre-commit/action is frozen on Node 20; the pre-commit project recommends
      # running the CLI directly. setup-python is already present, so install and
      # run pre-commit ourselves (no Node-20 action).
      - name: Run pre-commit
        run: |
          python -m pip install --upgrade pre-commit
          pre-commit run --all-files --show-diff-on-failure --color=always

  coverage:
    name: Coverage → Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write # upload coverage to GitHub Code Quality (no third party)
    steps:
      # Check out the PR head (not the merge commit) so coverage line numbers map
      # to the diff for the github-code-quality[bot] PR comment.
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      # protocol's dist is consumed by the downstream tests. Then run every
      # package's tests with v8 coverage — the per-package thresholds (85%
      # statements/lines/functions, 75% branches) FAIL this job on a regression,
      # and each run emits a Cobertura report for the upload below.
      - name: Test with coverage (enforces the 85% gate)
        run: |
          pnpm --filter @cloakcode/protocol build
          pnpm -r test:coverage
      # Upload each package's Cobertura report. No third party — the
      # github-code-quality[bot] posts the coverage summary on the pull request.
      # (Requires Code Quality enabled in the repo's Code security settings.)
      - name: Upload protocol coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-code-coverage@v1
        with:
          file: packages/protocol/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/protocol
      - name: Upload gateway coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-code-coverage@v1
        with:
          file: packages/gateway/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/gateway
      - name: Upload web coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-code-coverage@v1
        with:
          file: packages/web/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/web
      - name: Upload extension coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-code-coverage@v1
        with:
          file: packages/extension/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/extension
