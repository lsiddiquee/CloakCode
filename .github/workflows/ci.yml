name: CI

# Build · typecheck · lint · test the TypeScript monorepo (the shipped product)
# on every push to main and every PR. The research/ Python is stdlib-only spikes,
# not product — no Poetry/mypy/pytest gate; ruff still lints it via the `hooks`
# (pre-commit) job. No publishing here — that lives in release.yml (tags).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — build · typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # pnpm BEFORE setup-node so the pnpm cache can be wired. Version comes from
      # the `packageManager` pin in package.json (pnpm@11.9.0).
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      # NOTE: the committed .npmrc targets an internal Microsoft package feed
      # (supply-chain screened) for the dev container; public GitHub runners can't
      # reach it, so --registry overrides just the registry for this install (highest
      # -precedence npm-config source), leaving any other .npmrc settings intact. The
      # committed pnpm-lock.yaml is registry-portable (integrity-only, no absolute
      # tarball URLs), so --frozen-lockfile resolves it from public npm keeping every pin.
      - name: Install deps (public npm)
        run: pnpm install --frozen-lockfile --registry=https://registry.npmjs.org/

      # Topological order builds @cloakcode/protocol first, so the downstream
      # typechecks (which resolve its dist) pass.
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test

  hooks:
    name: pre-commit (gitleaks · markdownlint · prettier · ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      # The local eslint/prettier hooks need node_modules present. --registry
      # overrides just the registry for this install (see the node job); the
      # portable lockfile installs with --frozen-lockfile.
      - name: Install deps (public npm)
        run: pnpm install --frozen-lockfile --registry=https://registry.npmjs.org/
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # pre-commit/action is frozen on Node 20; the pre-commit project recommends
      # running the CLI directly. setup-python is already present, so install and
      # run pre-commit ourselves (no Node-20 action).
      - name: Run pre-commit
        run: |
          python -m pip install --upgrade pre-commit
          pre-commit run --all-files --show-diff-on-failure --color=always
