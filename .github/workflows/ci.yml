name: CI

# Build · typecheck · lint · test the TypeScript monorepo (the shipped product)
# on every push to main and every PR. The research/ Python is stdlib-only spikes,
# not product — no Poetry/mypy/pytest gate; ruff still lints it via the `hooks`
# (pre-commit) job. No publishing here — that lives in release.yml (tags).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — build · typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # pnpm BEFORE setup-node so the pnpm cache can be wired. Version comes from
      # the `packageManager` pin in package.json (pnpm@11.9.0).
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      # No committed .npmrc, so the default public npm registry applies; the
      # committed pnpm-lock.yaml is registry-portable (integrity-only, no absolute
      # tarball URLs — kept so by the `pnpm-lock-portable` pre-commit hook), so
      # --frozen-lockfile resolves it from public npm keeping every pin.
      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Topological order builds @cloakcode/protocol first, so the downstream
      # typechecks (which resolve its dist) pass.
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test

  docker:
    name: Gateway image — build · smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The ONE way to build + smoke-test the gateway image, shared with the
      # local WSL/host flow (scripts/docker-gateway.sh) so the two can't drift.
      # Runners ship Docker + curl; the script builds from packages/gateway/
      # Dockerfile and asserts the container serves the PWA (GET / → "CloakCode").
      - name: Build & smoke-test the gateway image
        run: bash scripts/docker-gateway.sh all

  hooks:
    name: pre-commit (gitleaks · markdownlint · prettier · ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      # The local eslint/prettier hooks need node_modules present. Default public
      # npm registry (no committed .npmrc); the portable lockfile installs with
      # --frozen-lockfile.
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Setup Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
      # ruff runs from the Poetry in-project venv (single source of truth =
      # pyproject.toml; see .pre-commit-config.yaml). Create .venv/bin/ruff here
      # so the local ruff/ruff-format hooks resolve. --only dev skips the (empty)
      # root package and installs just the lint/type toolchain.
      - name: Install Poetry
        run: pipx install poetry
      - name: Install Python tooling (ruff)
        run: poetry install --only dev
      # pre-commit/action is frozen on Node 20; the pre-commit project recommends
      # running the CLI directly. setup-python is already present, so install and
      # run pre-commit ourselves (no Node-20 action).
      - name: Run pre-commit
        run: |
          python -m pip install --upgrade pre-commit
          pre-commit run --all-files --show-diff-on-failure --color=always

  # Runs every package's tests with v8 coverage and FAILS on any regression below
  # the per-package thresholds (85% statements/lines/functions, 75% branches) —
  # this in-CI gate is the real coverage protection.
  #
  # We deliberately do NOT upload to GitHub Code Quality (the coverage-on-PRs
  # feature). Per the public-preview changelog (2026-05-26, "Availability and
  # pricing"), GitHub Code Quality is only available on GitHub Enterprise
  # Cloud/Team — so it CANNOT be enabled on this public/free open-source repo:
  # there is no setting to turn it on and the upload endpoint 404s. Uploading
  # anyway would either fail CI or need a silent `fail-on-error: false` mask, which
  # we won't carry. Revisit (add the actions/upload-code-coverage steps +
  # `code-quality: write` permission) only if this repo ever moves under an
  # Enterprise Cloud/Team org. See docs/06 field notes.
  coverage:
    name: Coverage — 85% gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      # Downstream tests import built workspace packages (e.g. the extension
      # tests import @cloakcode/gateway's dist), so build everything first — like
      # the node job. Then run every package's tests with v8 coverage: the
      # per-package thresholds FAIL this job on a regression.
      - name: Test with coverage (enforces the 85% gate)
        run: |
          pnpm -r build
          pnpm -r test:coverage
