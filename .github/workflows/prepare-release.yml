name: Prepare release

# One-click release prep. Run from the Actions tab (or `gh workflow run
# prepare-release.yml -f version=0.1.0`) with a plain SemVer version. It creates
# a `release/vX.Y.Z` branch, stamps the version into the shipped package.json
# files (lockstep: extension + gateway share one version), commits, and opens a
# PR to main. Review + merge, then cut the release by tagging:
#     git tag vX.Y.Z && git push origin vX.Y.Z      # → release.yml publishes
#
# The release branch is a durable record of each cut (not just the tag).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Product version — plain SemVer, e.g. 0.1.0 (no -rc/-beta suffix)"
        required: true
        type: string

permissions:
  contents: write # push the release branch

jobs:
  prepare:
    name: Bump + push release branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # set-version.mjs is stdlib-only Node; it validates SemVer and rejects
      # pre-release suffixes (the Marketplace can't take them). Runner Node is fine.
      - name: Stamp version + push release branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node scripts/set-version.mjs "$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "release/v$VERSION"
          git commit -aqm "chore(release): v$VERSION"
          git push -f -u origin "release/v$VERSION"

      # We don't call `gh pr create`: the default GITHUB_TOKEN is blocked from
      # creating PRs unless a repo setting is enabled. Printing the compare link
      # (one click to open the PR) is permission-free and always works.
      - name: Release branch ready
        env:
          VERSION: ${{ inputs.version }}
        run: |
          URL="${{ github.server_url }}/${{ github.repository }}/compare/main...release/v$VERSION?expand=1"
          {
            echo "### Release v$VERSION prepared"
            echo ""
            echo "Branch \`release/v$VERSION\` pushed with the version bump (extension + gateway, lockstep)."
            echo ""
            echo "1. **Open the PR:** [$URL]($URL)"
            echo "2. Review + merge it into \`main\`."
            echo "3. Cut the release: \`git tag v$VERSION && git push origin v$VERSION\` → the Release workflow verifies the tag matches the committed version, then builds and publishes to the gated targets."
          } >> "$GITHUB_STEP_SUMMARY"
