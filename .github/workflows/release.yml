name: Release

# Fires on a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# Builds + tests, then packages and PUBLISHES to the MVP targets:
#   • extension .vsix  → GitHub Release  (+ VS Code Marketplace when VSCE_PAT is set)
#   • gateway          → GitHub Release tarball (+ npm when NPM_TOKEN is set)
#   • gateway image    → Docker Hub + GHCR (when DOCKERHUB_TOKEN is set)
#
# Every external publish is GATED on its secret, so on the private pre-MVP repo a
# tag still produces a clean GitHub Release with the artifacts; the marketplace /
# npm / Docker Hub pushes light up once you add the secrets (see docs/05 M5).
#
# Self-contained gateway executables (win/linux/mac) are NOT built here yet — the
# gateway serves a PWA dir, so an exe must embed the web assets. Plan + recommended
# approach (npm `npx` minimum, then @yao-pkg/pkg or Node SEA with bundled assets)
# are in docs/05 "M5 — Packaging & deploy".
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release + upload assets
  packages: write # push the image to GHCR

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build · test · package · publish
    runs-on: ubuntu-latest
    # `secrets` cannot be referenced in `if:`; expose the gates as env so each
    # publish step can check them. An unset secret → empty string → step skipped.
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history + tags — scripts/changelog.mjs needs the log since the last tag
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # No committed .npmrc, so the default public npm registry applies (the
      # release also publishes there). The registry-portable lockfile installs
      # with --frozen-lockfile, keeping every pin.
      - name: Install deps
        run: pnpm install --frozen-lockfile

      # The version ships from the committed package.json (vsce/npm read it), so
      # the tag must match what was bumped on the release branch. Fail fast on
      # drift (e.g. tagging a commit that was never bumped). Skipped on manual
      # workflow_dispatch, which has no v* tag.
      - name: Verify tag matches committed version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          REF: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF#v}"
          for pkg in package.json packages/extension/package.json packages/gateway/package.json; do
            PKG_VERSION="$(node -p "require('./$pkg').version")"
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Tag v$TAG_VERSION != $pkg version $PKG_VERSION. Run 'Prepare release', merge the PR, then tag." >&2
              exit 1
            fi
          done
          echo "Tag v$TAG_VERSION matches all committed manifests."

      - run: pnpm -r build
      - run: pnpm -r test # never cut a release on red

      - name: Package extension (.vsix)
        run: pnpm --filter @cloakcode/extension package

      - name: Assemble gateway (bundle + PWA)
        run: pnpm --filter @cloakcode/gateway assemble

      - name: Tar the gateway bundle
        run: tar -C dist -czf "cloakcode-gateway-${GITHUB_REF_NAME}.tgz" gateway

      # Build categorized release notes from Conventional Commits. GitHub's own
      # generate_release_notes only lists merged PRs since the last tag — our flow
      # lands work on main directly and cuts a release via one chore(release) PR,
      # so those notes are near-empty. scripts/changelog.mjs reads the git log and
      # groups commits by type (features / fixes / … ) — useful by default.
      - name: Generate release notes
        run: node scripts/changelog.mjs --to "$GITHUB_REF_NAME" > RELEASE_NOTES.md
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      # --- Always: a GitHub Release with the artifacts (no external secrets) ---
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/extension/*.vsix
            dist/extension/install.sh
            dist/extension/uninstall.sh
            cloakcode-gateway-*.tgz

      # --- Gated: VS Code Marketplace (needs VSCE_PAT; consider OVSX_TOKEN too) ---
      - name: Publish extension → VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --packagePath "$(ls dist/extension/*.vsix | head -1)"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # --- Gated: npm (@cloakcode/gateway). Publishes the staged self-contained
      #     bundle (scripts/pack-npm.mjs → dist/gateway-npm: main.mjs + web + a
      #     clean deps-free manifest), reusing the assembled output above. Needs
      #     the @cloakcode scope owned on npm; scoped public → --access public. ---
      - name: Publish gateway → npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: |
          node packages/gateway/scripts/pack-npm.mjs
          npm publish ./dist/gateway-npm --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- Gated: Docker Hub + GHCR (self-contained build from repo root) ---
      - name: Set up Buildx
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push gateway image
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/gateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloakcode-gateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cloakcode-gateway:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/cloakcode-gateway:latest
            ghcr.io/${{ github.repository_owner }}/cloakcode-gateway:${{ github.ref_name }}

      # NOTE: the Docker Hub repo Overview is NOT synced from CI. Editing it via
      # the API needs the account password / a repo-settings-scoped PAT (a
      # push-only token 403s), which we won't store in CI for a cosmetic field.
      # Set it once by hand (Docker Hub → the repo → Manage Repository → paste
      # packages/gateway/README.md); it persists across pushes. GHCR already
      # renders the README automatically via the image's source label.
