# CloakCode pnpm workspace.
# Each package is a focused unit; see docs/03-architecture.md for the full breakdown.
packages:
  - packages/*

# Use the installed pnpm instead of downloading the version pinned in
# package.json's `packageManager` field. When resolving through the Microsoft
# package-feed proxy (set in your user ~/.npmrc) — a whole-package-metadata
# mirror that 404s the per-version manifest and redirects tarballs — pnpm/corepack
# self-provisioning can't work. The pin matches the base-image pnpm today, but
# keep `ignore` so any drift (a base-image bump, a dev's machine) never breaks
# every pnpm command. pnpm-v11 replacement for the removed
# `managePackageManagerVersions: false`.
pmOnFail: ignore

# pnpm 11 build-script allowlist (replaces the removed onlyBuiltDependencies /
# ignoredBuiltDependencies keys). esbuild (via vitest/vite) needs its platform
# binary linked → allow. vsce-sign is publish/signing-only native code that
# `vsce package` never needs → deny (don't build).
allowBuilds:
  esbuild: true
  "@vscode/vsce-sign": false

# VSCE's optional keytar integration stores publishing credentials. CloakCode
# only uses VSCE for local packaging, so omit that unused native module and its
# deprecated prebuild-install dependency.
ignoredOptionalDependencies:
  - keytar

# Supply-chain hardening (https://pnpm.io/supply-chain-security).
# Delay resolving freshly-published versions so a compromised release is likely
# caught + yanked before we ever install it. pnpm v11 defaults this to 1440
# (1 day); we widen it to 1 week. NOTE: pnpm also validates the committed
# lockfile against this policy on `--frozen-lockfile`, so the lockfile must only
# pin versions old enough to pass (rebuild if it flags a
# MINIMUM_RELEASE_AGE_VIOLATION). (Dependabot has its own delay: the `cooldown`
# block in .github/dependabot.yml.)
minimumReleaseAge: 10080 # minutes = 7 days

# NOTE: `trustPolicy: no-downgrade` was TRIED and REMOVED (2026-07-20). pnpm
# flagged a rotating set of widely-trusted, CVE-free packages (semver,
# undici-types, browserslist, nanoid) as "possible package takeover" based on
# provenance evidence that DIFFERS between npmjs and the MS feed mirror —
# registry-dependent false positives that broke `pnpm install --frozen-lockfile`
# in CI (locally the proxy flagged browserslist/nanoid; CI's real npmjs flagged
# semver/undici-types). An exclude list can't track that. Real takeovers still
# surface via GitHub Dependabot alerts + the minimumReleaseAge delay above.

# Refuse transitive dependencies pulled from exotic sources (git repos, direct
# tarball URLs) — force every sub-dependency to resolve from the registry,
# closing a common malware-injection vector. (Verified: the committed lockfile
# has no exotic sources, so this is a forward-guard, not a breaking change.)
blockExoticSubdeps: true
