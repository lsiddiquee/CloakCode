# CloakCode pnpm workspace.
# Each package is a focused unit; see docs/03-architecture.md for the full breakdown.
packages:
  - packages/*

# Use the installed pnpm instead of downloading the version pinned in
# package.json's `packageManager` field. The Microsoft package-feed proxy (.npmrc)
# is a whole-package-metadata mirror — it 404s the per-version manifest and
# redirects tarballs — so pnpm/corepack self-provisioning can't work against it.
# The pin matches the base-image pnpm today, but keep `ignore` so any drift (a
# base-image bump, a dev's machine) never breaks every pnpm command. pnpm-v11
# replacement for the removed `managePackageManagerVersions: false`.
pmOnFail: ignore

# pnpm 11 build-script allowlist (replaces the removed onlyBuiltDependencies /
# ignoredBuiltDependencies keys). esbuild (via vitest/vite) needs its platform
# binary linked → allow. vsce-sign + keytar are publish/signing-only native
# modules that `vsce package` never needs → deny (don't build).
allowBuilds:
  esbuild: true
  "@vscode/vsce-sign": false
  keytar: false
