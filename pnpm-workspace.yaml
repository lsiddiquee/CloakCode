# CloakCode pnpm workspace.
# Each package is a focused unit; see docs/03-architecture.md for the full breakdown.
packages:
  - packages/*

# Skip pnpm's `packageManager` self-provisioning. package.json pins pnpm@11.10.0,
# but the Microsoft package-feed proxy doesn't serve pnpm's own tarball in the
# integrity-only form pnpm requires, so the default `download` behavior fails
# every command once the registry points at the proxy (see .npmrc). `ignore` uses
# the installed pnpm instead (like asdf/Volta). This is the pnpm-v11 replacement
# for the removed `managePackageManagerVersions: false`.
pmOnFail: ignore

allowBuilds:
  esbuild: set this to true or false

# Allow esbuild (pulled in by vitest/vite) to run its install script so the
# platform binary is linked. pnpm 11 reads build allowlists from here.
onlyBuiltDependencies:
  - esbuild

# vsce (packaging devDependency) pulls in native modules used only for marketplace
# PUBLISH/signing — never for `vsce package`. We intentionally do NOT build them;
# acknowledge them so `pnpm install` and the pre-run deps check don't error.
ignoredBuiltDependencies:
  - "@vscode/vsce-sign"
  - keytar
